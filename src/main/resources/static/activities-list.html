<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>活动列表</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/base.css">
  <style>
    body {
      background-color: var(--bg-main);
      padding: 24px;
    }
    .activity-list {
      max-width: 1000px;
      margin: 0 auto;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
    }
    #activities {
      display: grid;
      gap: 16px;
    }
    .activity-card {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }
    .activity-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-color);
    }
    .activity-info h4 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 4px;
    }
    .activity-info p {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0;
    }
    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-active {
      background: #dcfce7;
      color: #166534;
    }
    .status-inactive {
      background: #f1f5f9;
      color: #475569;
    }
    .action-link {
      color: var(--primary-color);
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pagination {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }
    .pagination button {
      background: var(--white);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      color: var(--text-main);
      font-size: 14px;
      cursor: pointer;
      transition: var(--transition);
    }
    .pagination button:hover:not(:disabled) {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }
    .pagination input {
      width: 50px;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="activity-list fade-in">
  <div class="page-header">
    <h2 class="page-title">抽奖活动管理</h2>
  </div>
  <div id="activities">
    <!-- 活动列表将动态插入这里 -->
  </div>
  <div class="pagination">
    <button onclick="fetchActivities(1)">首页</button>
    <button onclick="previousPage()">上一页</button>
    <div style="display: flex; align-items: center; gap: 8px;">
      <span>第</span>
      <input type="number" id="pageInput" min="1" value="1" />
      <span>页</span>
    </div>
    <button onclick="nextPage()">下一页</button>
    <button onclick="fetchActivities(totalPages)">尾页</button>
  </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="./js/toastr.min.js"></script>
<script>
    var currentPage = 1;
    var pageSize = 10;
    var totalPages;
    var userToken = localStorage.getItem("user_token");

    function fetchActivities(page) {
      if (page < 1) page = 1;
      currentPage = page;
      
      $.ajax({
          url: '/activity/find-list',
          type: 'GET',
          data: { currentPage: currentPage, pageSize: pageSize },
          dataType: 'json',
          headers: { "user_token": userToken },
          success: function(result) {
            if (result.code != 200) {
                alert("查询活动列表失败！" + result.msg);
            } else {
                var activities = result.data.records;
                var activitiesHtml = '';
                activities.forEach(function(activity) {
                  var url = 'draw.html?activityName='+ encodeURIComponent(activity.activityName)
                          +'&activityId=' + encodeURIComponent(activity.activityId)
                          +'&valid=' + encodeURIComponent(activity.valid);
                  
                  var statusLabel = activity.valid ? '进行中' : '已结束';
                  var statusClass = activity.valid ? 'status-active' : 'status-inactive';
                  var actionText = activity.valid ? '去抽奖 →' : '查看结果 →';

                  activitiesHtml += `
                      <div class="activity-card">
                        <div class="activity-info">
                          <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 4px;">
                            <h4>${activity.activityName}</h4>
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                          </div>
                          <p>${activity.description || '暂无描述'}</p>
                        </div>
                        <a href="${url}" target="_blank" class="action-link">${actionText}</a>
                      </div>
                    `;
                });
                $('#activities').html(activitiesHtml);
                totalPages = Math.ceil(result.data.total / pageSize);
                $('#pageInput').val(currentPage);
              }
          },
        error: function(err) {
          if(err && err.status == 401) {
            window.parent.location.href = "/blogin.html";
          }
        }
      });
    }


    function previousPage() {
      if (currentPage > 1) {
        fetchActivities(currentPage - 1);
      } else {
        alert("已经是第一页");
      }
    }

    function nextPage() {
      if (currentPage < totalPages) {
        fetchActivities(currentPage + 1);
      } else {
        alert("已经是最后一页");
      }
    }

    $(document).ready(function() {
      fetchActivities(1);
    });

    // 绑定输入框回车事件
    $('#pageInput').on('keypress', function(e) {
      if (e.key === 'Enter') {
        var page = parseInt(this.value);
        if(page > totalPages){
          page = totalPages
          $('#pageInput').val(totalPages);
        }
        if (!isNaN(page) && page >= 1 && page <= totalPages) {
          fetchActivities(page);
        }
      }
    });

</script>
</body>
</html>
