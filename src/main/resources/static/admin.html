
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>后台管理</title>
  <link rel="stylesheet" href="https://cdn.staticfile.org/twitter-bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/base.css">
  <style>
    :root {
      --sidebar-width: 260px;
    }
    .admin-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: var(--bg-main);
    }
    .admin-page .header-box {
      height: 70px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      width: 100%;
      display: flex;
      align-items: center;
      padding: 0 40px;
      box-shadow: 0 1px 0 0 var(--border-color);
      z-index: 100;
      justify-content: space-between;
      position: sticky;
      top: 0;
    }
    .logo-box {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .logo-box img {
      height: 36px;
      transition: var(--transition);
    }
    .logo-box .brand-name {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-color), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header-box .user-box {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-box .home-btn {
      padding: 8px 16px;
      border-radius: var(--radius-md);
      color: var(--text-main);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: var(--transition);
      background: var(--secondary-color);
    }
    .header-box .home-btn:hover {
      background: #e2e8f0;
      transform: translateY(-1px);
    }
    .header-box .logout-btn {
      padding: 8px 16px;
      border-radius: var(--radius-md);
      color: var(--danger);
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: var(--transition);
    }
    .header-box .logout-btn:hover {
      background-color: #fef2f2;
    }
    .admin-page .cont-box {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .admin-page .sidebar {
      width: var(--sidebar-width);
      background-color: var(--white);
      border-right: 1px solid var(--border-color);
      padding: 24px 16px;
      overflow-y: auto;
    }
    .admin-page .nav-item {
      margin-bottom: 8px;
    }
    .admin-page .nav-group-title {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
      border-radius: var(--radius-md);
      transition: var(--transition);
    }
    .admin-page .nav-link {
      display: flex;
      align-items: center;
      padding: 10px 16px 10px 44px;
      color: var(--text-muted);
      font-size: 14px;
      border-radius: var(--radius-md);
      transition: var(--transition);
      margin-top: 2px;
    }
    .admin-page .nav-link:hover {
      background-color: var(--secondary-color);
      color: var(--primary-color);
    }
    .admin-page .nav-link.active {
      background-color: #eef2ff;
      color: var(--primary-color);
      font-weight: 600;
    }
    .admin-page .main-content {
      flex: 1;
      padding: 24px;
      overflow: hidden;
    }
    .iframe-styles {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      background-color: var(--white);
    }
  </style>
</head>
<body class="admin-page">
<div class="header-box">
  <div class="logo-box" onclick="location.reload()">
    <img src="./pic/logo.png" alt="Logo">
    <span class="brand-name">Lucky Lottery</span>
  </div>
  <div class="user-box">
    <div class="home-btn" onclick="location.href='/activities-list.html'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>回到首页</span>
    </div>
    <div class="logout-btn" onclick="logout()">
      <img src="./pic/logout.svg" alt="" style="width: 18px;">
      <span>退出系统</span>
    </div>
  </div>
</div>
<div class="cont-box">
  <div class="sidebar">
    <div class="nav flex-column">
      <div class="nav-item">
        <div class="nav-group-title">
          <img src="./pic/huodong-0.png" style="width: 20px;" alt="">
          <span>活动管理</span>
        </div>
        <div class="sub-category">
          <a class="nav-link active" id="activitiesList" href="activities-list.html">活动列表</a>
          <a class="nav-link" id="createActivity" href="create-activity.html">新建抽奖活动</a>
        </div>
      </div>
      <div class="nav-item">
        <div class="nav-group-title">
          <img src="./pic/jiangpin-0.png" style="width: 20px;" alt="">
          <span>奖品管理</span>
        </div>
        <div class="sub-category">
          <a class="nav-link" href="prizes-list.html">奖品列表</a>
          <a class="nav-link" href="create-prizes.html">创建奖品</a>
        </div>
      </div>
      <div class="nav-item">
        <div class="nav-group-title">
          <img src="./pic/renyuan-0.png" style="width: 20px;" alt="">
          <span>人员管理</span>
        </div>
        <div class="sub-category">
          <a class="nav-link" id="userList" href="user-list.html">人员列表</a>
          <a class="nav-link" id="register" href="register.html">注册用户</a>
        </div>
      </div>
    </div>
  </div>
  <div class="main-content">
    <iframe id="contentFrame" src="activities-list.html" class="iframe-styles fade-in"></iframe>
  </div>
</div>

<!-- 引入jQuery和Bootstrap的JavaScript -->
<script
        src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
  // 监听子message事件,实现子页面向父页面传递
  window.addEventListener('message', function(e){
    console.log('子页面传递的数据', e.data)
    if(e.data && e.data.from){
      var pages = e.data.from+'?param=' +  new Date().getTime()
      $('#contentFrame').attr('src', pages);
      let id = e.data.id
      // 移除所有链接的激活样式
      $('ul.nav .nav-link').removeClass('active');
      // 为当前点击的链接添加激活样式
      $(id).addClass('active');
      $(id).parent().parent('.sub-category').prev().addClass('active');
    }
  }, false);

  // 导航点击事件处理
  $('.nav a').on('click', function(event) {
    // 阻止链接默认的导航行为，这样页面不会跳转到href属性指定的URL。
    event.preventDefault();
    // 移除所有链接的激活样式
    $('.nav .nav-link').removeClass('active');
    // 为当前点击的链接添加激活样式
    $(this).addClass('active');
    // 选中二级菜单时默认选中对应的一级菜单
    $(this).parent().parent('.sub-category').prev().addClass('active');

    // 生成一个随机参数（时间戳） 解决iframe缓存问题
    var randomParam = new Date().getTime();
    // 获取当前点击的链接的data-desc属性值
    var dataDesc = $(this).data('desc');
    var page = '';
    if (dataDesc === "renyuancreate") {
      page = $(this).attr('href') + "?param=" + randomParam + "&jumpList=true&admin=false";
    } else {
      page = $(this).attr('href') + "?param=" + randomParam;
    }
    $('#contentFrame').attr('src', page);
  });

  // 确保默认情况下第一个链接是激活状态
  $(document).ready(function() {
    $('.nav a:first').addClass('active');
  });

  // 退出登录
  function logout(){
    localStorage.removeItem("user_token")
    location.href='/blogin.html'
  }
</script>
</body>
</html>
