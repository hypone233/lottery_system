spring.application.name=lottery_system

## logback xml ##
logging.config=classpath:logback-spring.xml
spring.profiles.active=dev

## MySQL ##
# 驱动类名称
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库连接的 url（注意将 ? 后参数写在同一行）
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/lottery_system?characterEncoding=utf8&useSSL=false

# 连接数据库的用户名
spring.datasource.username=root

# 连接数据库的密码
spring.datasource.password=10252788


## MyBatis ##
# 如果你使用 XML Mapper（没用可以注释）
# mybatis.mapper-locations=classpath:mapper/*Mapper.xml

# 配置驼峰自动转换
mybatis.configuration.map-underscore-to-camel-case=true
#type-handlers处理路径
mybatis.type-handlers-package=com.zzz.lotterysystem.dao.handler


## redis ##
spring.data.redis.host=localhost
spring.data.redis.port=6666
# 连接空闲超过N(s秒、ms毫秒)后关闭，0为禁⽤，这⾥配置值和tcp-keepalive值⼀致
spring.data.redis.timeout=60s
# 默认使⽤ lettuce 连接池
# 允许最⼤连接数，默认8（负值表⽰没有限制）
spring.data.redis.lettuce.pool.max-active=8
# 最⼤空闲连接数，默认8
spring.data.redis.lettuce.pool.max-idle=8
# 最⼩空闲连接数，默认0
spring.data.redis.lettuce.pool.min-idle=0
# 连接⽤完时，新的请求等待时间(s秒、ms毫秒)，超过该时间抛出异常JedisConnectionException，(默认-1，负值表⽰没有限制)
spring.data.redis.lettuce.pool.max-wait=5s